services:
  cache:
    image: valkey/valkey:9.0.3
    volumes:
    - redis-data:/data
    command: [valkey-server, --save, '60', '1', --loglevel, warning]
    restart: always
    read_only: true
  weblate:
    build:
      context: ..
      dockerfile: weblate-docker/Dockerfile
    image: boost-weblate:latest
    extra_hosts:
    - host.docker.internal:host-gateway
    depends_on:
    - cache
    volumes:
    - weblate-data:/app/data
    - weblate-cache:/app/cache
    env_file:
    - ./environment
    ports:
    - 8000:8080
    restart: always
    read_only: true
    tmpfs:
    - /run
    - /tmp
volumes:
  weblate-cache: {}
  weblate-data: {}
  redis-data: {}
